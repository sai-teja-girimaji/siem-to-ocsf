name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

      - name: Smoke-test CLI on bundled samples
        run: |
          siem-to-ocsf samples/ --source auto --out out/ocsf.jsonl
          test "$(wc -l < out/ocsf.jsonl)" -eq 18
